name: Build and Release

on:
  push:
    branches: [main, master, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

env:
  CMAKE_VERSION: '3.28.1'
  Qt5_VERSION: '5.15.2'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container: ubuntu:24.04
    strategy:
      fail-fast: false

    steps:
      - name: Install Dependencies
        run: |
          apt-get update
          apt-get install -y cmake qtbase5-dev libdjvulibre-dev qtbase5-dev-tools g++ build-essential

      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Build Directory
        run: mkdir -p build

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17

      - name: Build
        run: cmake --build build --parallel

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: djvureader-linux
          path: build/djvureader
          retention-days: 7

  build-macos:
    runs-on: macos-14
    strategy:
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install qt@5 djvulibre cmake

      - name: Set Qt Path
        run: echo "Qt5_DIR=$(brew --prefix qt@5)/lib/cmake" >> $GITHUB_ENV

      - name: Create Build Directory
        run: mkdir -p build

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17

      - name: Build
        run: cmake --build build --parallel

      - name: Bundle Qt
        run: |
          mkdir -p app
          cp build/djvureader app/
          macqtfix app

      - name: Create DMG
        run: |
          hdiutil create -volname "DJVU Reader" -srcfolder app -ov -format UDZO dmg/djvureader.dmg || \
          hdiutil create -volname "DJVU Reader" -srcfolder app -ov -format UDZO dmg/djvureader.dmg

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: djvureader-macos
          path: build/djvureader
          retention-days: 7

  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: jsalmon11/setup-cmake@v1
        with:
          cmake-version: '3.28.1'

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:/vcpkg
          C:/vcpkg/bootstrap-vcpkg.bat

      - name: Install Dependencies
        run: |
          C:/vcpkg/vcpkg integrate install
          C:/vcpkg/vcpkg install djvulibre:x64-windows qt5:x64-windows

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DCMAKE_CXX_STANDARD=17

      - name: Build
        run: cmake --build build --parallel

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: djvureader-windows
          path: build/Release/djvureader.exe
          retention-days: 7

  package:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "DJVU Reader ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/djvureader-linux/* \
            artifacts/djvureader-macos/* \
            artifacts/djvureader-windows/*